<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LavaStill | الإصدار العلمي الأكاديمي</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #121212; --input: #1a1a1a; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; padding: 15px; min-height: 100vh; }
        .page { display: none; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        .btn { background: var(--card); border: 1px solid var(--gold); padding: 18px; border-radius: 12px; color: var(--gold); cursor: pointer; text-align: center; font-weight: bold; margin-top: 10px; display: block; width: 100%; box-sizing: border-box; text-decoration: none; }
        .btn:active { background: var(--gold); color: #000; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: var(--input); color: #fff; box-sizing: border-box; }
        .report { background: #1a1a1a; padding: 15px; border-radius: 10px; border-right: 5px solid var(--gold); margin-top: 15px; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage" class="page active">
        <h1>LavaStill 🌋</h1>
        <p style="text-align:center">منصة التحليل النفسي المبنية على دراسات عالمية</p>
        <input type="text" id="userName" placeholder="ادخل اسمك">
        <button class="btn" onclick="initApp()">دخول المنصة</button>
    </div>

    <div id="homePage" class="page">
        <h2 id="userHello"></h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="btn" onclick="showPage('measurePage')">🧠 قياس النفسية</div>
            <div class="btn" onclick="showPage('neuroPage')">⚡ الحالة العصبية</div>
            <div class="btn" onclick="showPage('addictPage')">🛡️ خطة التعافي</div>
            <div class="btn" onclick="showPage('ventPage')">🗣️ فضفضة AI</div>
            <div class="btn" onclick="showPage('taskPage')">✅ المهام</div>
            <div class="btn" onclick="showPage('diaryPage')">📓 المذكرات</div>
        </div>
    </div>

    <div id="neuroPage" class="page">
        <h3>تحليل الجهاز العصبي (Bio-Stress) ⚡</h3>
        <p style="font-size:12px">بناءً على معايير الإجهاد العصبي التراكمي:</p>
        <label>هل تعاني من تشنجات لا إرادية أو رعشة بسيطة؟</label>
        <select id="n1"><option value="0">لا</option><option value="2">أحياناً</option><option value="5">كثيراً</option></select>
        <label>هل تشعر بصداع ضاغط في مؤخرة الرأس؟</label>
        <select id="n2"><option value="0">لا</option><option value="2">أحياناً</option><option value="5">كثيراً</option></select>
        <button class="btn" onclick="calcNeuro()">تحليل الحالة العصبية</button>
        <div id="neuroRes" class="report" style="display:none"></div>
        <button class="btn" style="background:none" onclick="showPage('homePage')">عودة</button>
    </div>

    <div id="addictPage" class="page">
        <h3>بروتوكول التعافي العلمي 🛡️</h3>
        <label>حدد نوع السلوك المراد علاجه:</label>
        <select id="addictCat">
            <option value="chemical">إدمان مواد (تدخين، منبهات..)</option>
            <option value="behavioral">إدمان سلوكي (إنترنت، ألعاب..)</option>
        </select>
        <button class="btn" onclick="generatePlan()">استخراج خطة التعافي</button>
        <div id="planRes" class="report" style="display:none"></div>
        <button class="btn" style="background:none" onclick="showPage('homePage')">عودة</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initApp() {
        const name = document.getElementById('userName').value;
        if(name) {
            localStorage.setItem('ls_name', name);
            document.getElementById('userHello').innerText = "أهلاً بك، " + name + " ✨";
            showPage('homePage');
        }
    }

    function calcNeuro() {
        const score = parseInt(document.getElementById('n1').value) + parseInt(document.getElementById('n2').value);
        const res = document.getElementById('neuroRes');
        res.style.display = 'block';
        if(score >= 7) {
            res.innerHTML = "<b>التحليل:</b> تظهر المؤشرات إجهاداً عصبياً مرتفعاً (Hyperarousal). المرجع: دراسات الجهاز العصبي السمبثاوي. ننصح بتمارين تفريغ الشحنات.";
        } else {
            res.innerHTML = "<b>التحليل:</b> استقرار في الوظائف العصبية الحسية. ننصح بالحفاظ على دورات النوم المنتظمة.";
        }
    }

    function generatePlan() {
        const cat = document.getElementById('addictCat').value;
        const res = document.getElementById('planRes');
        res.style.display = 'block';
        if(cat === "chemical") {
            res.innerHTML = "<b>الخطة العلمية:</b> اعتماد بروتوكول التخلص من السموم التدريجي + تعويض الدوبامين الطبيعي عبر الرياضة. (مرجع: NIH Guide).";
        } else {
            res.innerHTML = "<b>الخطة العلمية:</b> تطبيق تقنية 'الصيام الرقمي' وإعادة هيكلة المكافأة الدماغية. (مرجع: دراسات السلوك المعرفي بجامعة ستانفورد).";
        }
    }
</script>

</body>
</html>
