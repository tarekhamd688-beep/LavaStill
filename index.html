<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LavaStill | النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* الألوان والهوية البصرية الثابتة */
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-bg: #121212;
            --text: #e0e0e0;
            --shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* نظام الصفحات الذكي */
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* العناصر الفخمة */
        .lava-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .gold-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .gold-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* شبكة الأزرار الرئيسية */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-item {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .grid-item:hover { border-color: var(--gold); }
        .grid-item i { font-size: 28px; display: block; margin-bottom: 10px; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="authPage" class="page">
        <div style="text-align: center; margin-top: 50px;">
            <div style="font-size: 70px;">🌋</div>
            <h1 style="color:var(--gold); font-size: 40px;">LavaStill</h1>
            <p style="color:#888;">أنت على بُعد خطوة من التغيير</p>
        </div>
        <div class="lava-card" style="margin-top: 40px;">
            <input type="text" id="userNameInput" placeholder="أدخل اسمك هنا" 
                   style="width:100%; padding:15px; background:#000; border:1px solid #444; color:#fff; border-radius:12px; margin-bottom:20px; text-align:center; font-family:'Cairo';">
            <button class="gold-btn" onclick="initApp()">ابدأ الرحلة</button>
        </div>
    </div>

    <div id="dashboardPage" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="displayUserName" style="margin:0;">مرحباً..</h2>
            <div style="width:45px; height:45px; border-radius:50%; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--gold);">LS</div>
        </div>

        <div class="lava-card" style="text-align: center; border-bottom: 4px solid var(--gold);">
            <p style="margin:0; font-size:14px; color:#888;">أيام الصمود المستمر</p>
            <h1 id="soberCounter" style="font-size: 65px; margin:10px 0; color:var(--gold);">0</h1>
            <button class="gold-btn" style="padding:10px; font-size:14px; width:auto;" onclick="incrementDay()">تم يومي بنجاح ✅</button>
        </div>

        <div class="main-grid">
            <div class="grid-item" onclick="openModule('psy')">🧠<br>قياس النفسية</div>
            <div class="grid-item" onclick="openModule('neuro')">⚡<br>الحالة العصبية</div>
            <div class="grid-item" onclick="openModule('recovery')">🛡️<br>خطة التعافي</div>
            <div class="grid-item" onclick="openModule('vent')">💬<br>فضفضة AI</div>
            <div class="grid-item" onclick="openModule('tasks')">📅<br>المهام اليومية</div>
            <div class="grid-item" onclick="openModule('notes')">📔<br>المذكرات</div>
        </div>
    </div>

</div>

<script>
    /* محرك البيانات (Data Engine) */
    let appData = {
        user: localStorage.getItem('ls_user') || '',
        days: parseInt(localStorage.getItem('ls_days')) || 0
    };

    function initApp() {
        const name = document.getElementById('userNameInput').value;
        if(name.trim()) {
            appData.user = name;
            localStorage.setItem('ls_user', name);
            renderDashboard();
        }
    }

    function renderDashboard() {
        if(!appData.user) {
            showPage('authPage');
        } else {
            document.getElementById('displayUserName').innerText = "مرحباً، " + appData.user;
            document.getElementById('soberCounter').innerText = appData.days;
            showPage('dashboardPage');
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function incrementDay() {
        appData.days++;
        localStorage.setItem('ls_days', appData.days);
        document.getElementById('soberCounter').innerText = appData.days;
    }

    function openModule(mod) {
        // هنا سنقوم ببناء كل موديول بشكل مستقل ومنظم في المطبخ
        alert("جاري تحضير قسم " + mod + " بأعلى معايير الجودة...");
    }

    // تشغيل التطبيق
    renderDashboard();
</script>

</body>
</html>
