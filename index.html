<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LavaStill | نظام التعافي المتطور</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #121212; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        .btn { background: var(--card); border: 1px solid var(--gold); padding: 15px; border-radius: 10px; color: var(--gold); cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-emergency { background: #721c24; color: #f8d7da; border: 1px solid #f5c6cb; } /* زر الطوارئ */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .report-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border-right: 5px solid var(--gold); margin-top: 15px; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="homePage" class="page active">
        <h1 style="color:var(--gold)">LavaStill 🌋</h1>
        <div class="btn" onclick="showPage('addictPage')">🛡️ نظام التعافي من الإدمان (مفعّل)</div>
        <p style="text-align:center; font-size:12px; color:#666">باقي الأزرار جاري تطويرها باحترافية...</p>
    </div>

    <div id="addictPage" class="page">
        <h2 style="color:var(--gold)">درع التعافي 🛡️</h2>
        <div id="step1">
            <p>1. ما هو نوع التحدي الذي تواجهه؟</p>
            <select id="addictType">
                <option value="digital">إدمان رقمي (سوشيال ميديا/ألعاب)</option>
                <option value="substance">إدمان مواد (تدخين/كافيين/أخرى)</option>
            </select>
            <p>2. كم مرة حاولت الإقلاع سابقاً؟</p>
            <input type="number" id="attempts" placeholder="0">
            <button class="btn" onclick="processAddict()">تحليل وبدء الخطة</button>
        </div>

        <div id="recoveryReport" class="report-card" style="display:none">
            <h3 id="reportTitle"></h3>
            <div id="reportContent"></div>
            <hr border="0" height="1" style="background:#333">
            <button class="btn btn-emergency" onclick="emergencyHelp()">🚨 أنا أشعر بضعف الآن (طوارئ)</button>
        </div>
        
        <button class="btn" style="background:none" onclick="showPage('homePage')">عودة</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function processAddict() {
        const type = document.getElementById('addictType').value;
        const attempts = document.getElementById('attempts').value;
        const report = document.getElementById('recoveryReport');
        const content = document.getElementById('reportContent');
        
        report.style.display = 'block';
        document.getElementById('step1').style.display = 'none';

        if(type === 'digital') {
            document.getElementById('reportTitle').innerText = "خطة إعادة الهيكلة العصبية";
            content.innerHTML = `
                <b>التشخيص:</b> إدمان سلوكي يؤثر على مستويات الدوبامين.<br>
                <b>الخطوة 1:</b> تطبيق "الصيام الرقمي" لمدة ٤ ساعات يومياً.<br>
                <b>الخطوة 2:</b> استبدال التصفح بنشاط حركي (مشي/قراءة).<br>
                <b>نصيحة:</b> عقلك يحتاج ٢١ يوماً لترميم المسارات العصبية.
            `;
        } else {
            document.getElementById('reportTitle').innerText = "بروتوكول التحرر الكيميائي";
            content.innerHTML = `
                <b>التشخيص:</b> اعتمادية مادية على مادة خارجية.<br>
                <b>الخطوة 1:</b> تقليل الجرعة بنسبة ٢٠٪ كل ٣ أيام.<br>
                <b>الخطوة 2:</b> شرب كميات كبيرة من الماء لطرد السموم.<br>
                <b>تحذير:</b> في حال ظهور أعراض انسحاب شديدة، يرجى استشارة طبيب فوراً.
            `;
        }
    }

    function emergencyHelp() {
        alert("توقف! تنفس بعمق ١٠ مرات. تذكر لماذا بدأت. الرغبة الملحة تستمر فقط من ٣ لـ ٥ دقائق وستختفي. أنت أقوى!");
    }
</script>

</body>
</html>
