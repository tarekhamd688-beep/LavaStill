<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LavaStill | إدارة التعافي</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #121212; --danger: #ff4d4d; }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .page { display: none; animation: fadeIn 0.4s; }
        .active { display: block; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .btn { background: var(--card); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; color: var(--gold); cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .counter { font-size: 40px; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .progress-bar { background: #333; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: var(--gold); height: 100%; width: 0%; transition: 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <h1 style="color:var(--gold)">LavaStill 🌋</h1>
        <div class="card">
            <h3>مرحباً طارق</h3>
            <p>مشوار الألف ميل يبدأ بخطوة واعية.</p>
            <button class="btn" onclick="showPage('addictDashboard')">🛡️ لوحة تحكم التعافي</button>
            <button class="btn" onclick="showPage('ventPage')" style="border-color:#444">🗣️ فضفضة ومراقبة مشاعر</button>
        </div>
    </div>

    <div id="addictDashboard" class="page">
        <h2 style="color:var(--gold)">عداد الحرية 🕊️</h2>
        
        <div class="card" style="text-align: center;">
            <p id="habitName">جاري متابعة هدفك...</p>
            <div class="counter" id="daysCount">0</div>
            <p>يوم من الصمود</p>
            <div class="progress-bar"><div id="pFill" class="progress-fill"></div></div>
            <button class="btn" onclick="resetCounter()" style="border-color:var(--danger); color:var(--danger); margin-top:20px; font-size:12px;">لقد انتكست (إعادة العداد)</button>
        </div>

        <div class="card">
            <h4>إسعافات سريعة 🚨</h4>
            <button class="btn" onclick="triggerSupport('craving')">أشعر برغبة ملحة الآن</button>
            <button class="btn" onclick="triggerSupport('boredom')">أشعر بالملل/الفراغ</button>
        </div>

        <button class="btn" style="background:none" onclick="showPage('homePage')">عودة للرئيسية</button>
    </div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // نظام العداد (Logic)
    let days = localStorage.getItem('ls_days') || 0;
    document.getElementById('daysCount').innerText = days;
    updateProgress();

    function resetCounter() {
        if(confirm("لا بأس، الفشل جزء من التعافي. هل تريد البدء من جديد اليوم؟")) {
            days = 0;
            saveAndUI();
        }
    }

    function triggerSupport(type) {
        if(type === 'craving') {
            alert("⚠️ تنبيه علمي: الرغبة الملحة (Cravings) تدوم كحد أقصى 15 دقيقة كيميائياً. اشرب كوب ماء كبير الآن، وتحرك من مكانك فوراً!");
        } else {
            alert("⚠️ الفراغ هو العدو الأول. اقترح عليك: تمرين ضغط 10 مرات، أو قراءة صفحتين من كتاب، أو مكالمة صديق.");
        }
    }

    function saveAndUI() {
        localStorage.setItem('ls_days', days);
        document.getElementById('daysCount').innerText = days;
        updateProgress();
    }

    function updateProgress() {
        let percent = (days / 90) * 100; // الهدف الأول 90 يوم
        document.getElementById('pFill').style.width = percent + "%";
    }

    // تجربة: زيادة يوم تلقائياً (للعرض فقط)
    // في التطبيق الحقيقي سنحسب الفرق بين تاريخين
</script>

</body>
</html>
