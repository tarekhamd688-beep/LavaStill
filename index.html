<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LavaStill Pro | المنصة العلاجية</title>
    <style>
        :root { --gold: #c5a02e; --bg: #0a0a0a; --card: #151515; --text: #f0f0f0; --accent: #2196F3; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; line-height: 1.6; }
        .app-container { max-width: 450px; margin: auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* تصميم كروت الواجهة */
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        
        /* العناصر التفاعلية */
        .btn-prime { background: linear-gradient(135deg, var(--gold), #8e731d); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn-sec { background: transparent; border: 1px solid #444; color: #888; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 10px; }
        
        /* العداد المتقدم */
        .stat-circle { width: 120px; height: 120px; border: 4px solid var(--gold); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; box-shadow: 0 0 20px rgba(197, 160, 46, 0.2); }
        
        /* الأقسام */
        .page { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        textarea { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; resize: none; font-size: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="authPage" class="page active">
        <div style="text-align: center; margin-top: 50px;">
            <h1 style="color: var(--gold); font-size: 40px; margin-bottom: 5px;">LavaStill</h1>
            <p style="color: #666;">Intelligence for Human Recovery</p>
        </div>
        <div class="card" style="margin-top: 40px;">
            <input type="text" id="uName" placeholder="اسم المستخدم (للتشفير الشخصي)" style="width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px;">
            <button class="btn-prime" onclick="startApp()">فتح البوابة الآمنة</button>
        </div>
    </div>

    <div id="mainDashboard" class="page">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="welcomeTitle">أهلاً بك</h3>
            <div style="color: var(--gold); font-size: 12px;">ID: SECURE-01</div>
        </header>

        <div class="card">
            <p style="font-size: 14px; color: #888; margin: 0;">مستوى الصمود الحالي</p>
            <div class="stat-circle" id="dayCount">0</div>
            <p style="text-align: center; margin: 0; font-size: 13px;">يوم من الحرية والتعافي</p>
            <button class="btn-sec" onclick="showPage('recoveryPlan')">تعديل الخطة العلاجية</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="card" onclick="showPage('aiTherapist')" style="cursor: pointer; text-align: center; padding: 15px;">
                <span style="font-size: 25px;">💬</span><br><b>المحلل AI</b>
            </div>
            <div class="card" onclick="showPage('neuroCheck')" style="cursor: pointer; text-align: center; padding: 15px;">
                <span style="font-size: 25px;">⚡</span><br><b>فحص عصبي</b>
            </div>
        </div>
    </div>

    <div id="aiTherapist" class="page">
        <h3>المحلل النفسي الرقمي 🧠</h3>
        <div class="card" style="background: #000; min-height: 150px; font-size: 14px;" id="aiOutput">
            أنا أسمعك الآن بنظام تشفير كامل.. عبّر عن مشاعرك بعمق، وسأقوم بتحليل الأنماط العصبية في كلماتك.
        </div>
        <textarea id="aiInput" rows="4" placeholder="بماذا تشعر في هذه اللحظة؟"></textarea>
        <button class="btn-prime" onclick="processEmotion()">تحليل الحالة الآن</button>
        <button class="btn-sec" onclick="showPage('mainDashboard')">العودة للوحة التحكم</button>
    </div>
</div>

<script>
    // خوارزميات النظام
    const state = {
        name: localStorage.getItem('ls_name') || '',
        days: parseInt(localStorage.getItem('ls_days')) || 0
    };

    function startApp() {
        const nameInput = document.getElementById('uName').value;
        if(nameInput) {
            state.name = nameInput;
            localStorage.setItem('ls_name', nameInput);
            document.getElementById('welcomeTitle').innerText = `أهلاً، ${state.name}`;
            document.getElementById('dayCount').innerText = state.days;
            showPage('mainDashboard');
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function processEmotion() {
        const input = document.getElementById('aiInput').value;
        const output = document.getElementById('aiOutput');
        
        // خوارزمية تحليل المشاعر (Sentiment Analysis Simulation)
        if(input.length < 10) {
            output.innerHTML = "<span style='color: var(--gold)'>تحتاج للتعبير أكثر حتى أتمكن من رصد الأنماط بدقة.</span>";
            return;
        }

        let diagnosis = "تحليل الأنماط: نبرة كلامك مستقرة، لكن يظهر بها ميل للعزلة.";
        if(input.includes("تعب") || input.includes("مخنق")) diagnosis = "تنبيه: تم رصد إجهاد تراكمي (Burnout). المرجع: مقياس ماسلاش. ننصح بقطع المحفزات فوراً.";
        if(input.includes("خوف") || input.includes("مستقبل")) diagnosis = "تحليل: مؤشرات قلق استباقي (Anticipatory Anxiety). بروتوكول العلاج: تمرين التمركز (5-4-3-2-1).";

        output.innerHTML = `<span style='color: var(--accent)'>تم الفحص:</span><br>${diagnosis}`;
    }

    window.onload = () => { if(state.name) startApp(); };
</script>
</body>
</html>
