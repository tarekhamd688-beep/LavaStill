<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LavaStill | منصة التحليل النفسي والذكاء الوجداني</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .card { background: var(--gray); border: 1px solid var(--gold); padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--gold); margin-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; }
        #dashboard { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: var(--gray); p: 20px; border-radius: 12px; border-right: 4px solid var(--gold); padding: 20px; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-screen">
        <div class="card">
            <h1>LavaStill 🌋</h1>
            <p>منصة التحليل النفسي المتطورة</p>
            <input type="text" id="user" placeholder="معرف الباحث / المستخدم">
            <input type="password" placeholder="كلمة المرور">
            <button onclick="showDashboard()">دخول المنصة</button>
        </div>
    </div>

    <div id="dashboard">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding-bottom: 10px;">
            <h2>لوحة البيانات الحيوية والنفسية</h2>
            <button onclick="location.reload()" style="width: auto; padding: 5px 15px;">تسجيل خروج</button>
        </header>

        <div class="grid">
            <div class="stat-card">
                <h3>مؤشر الحالة المزاجية (القياس الحالي)</h3>
                <p>بناءً على الدراسات السلوكية المحدثة</p>
                <canvas id="moodChart"></canvas>
            </div>
            <div class="stat-card">
                <h3>تحليل مستوى التوتر (Bio-Data)</h3>
                <p>مستوى الإجهاد العصبي: <span style="color: var(--gold)">منخفض</span></p>
                <div style="background: #333; height: 10px; border-radius: 5px; margin-top: 20px;">
                    <div style="background: var(--gold); width: 35%; height: 100%; border-radius: 5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('moodChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء'],
                    datasets: [{
                        label: 'استقرار الحالة النفسية',
                        data: [70, 85, 75, 90, 80],
                        borderColor: '#d4af37',
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
